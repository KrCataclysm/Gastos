    <title>Gastos - Controle de Gastos</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem("gastos:theme");
          if (!raw) return;
          var t = JSON.parse(raw);
          var r = document.documentElement.style;
          r.setProperty("--color-bg", t.bgColor);
          r.setProperty("--color-panel", t.panelColor);
          r.setProperty("--color-panel-alt", t.panelAltColor);
          r.setProperty("--color-border", t.borderColor);
          r.setProperty("--color-text", t.fontColor);
          r.setProperty("--color-text-muted", t.mutedColor);
          r.setProperty("--color-accent", t.accentColor);
          r.setProperty("--color-income", t.incomeColor);
          r.setProperty("--color-expense", t.expenseColor);
          r.setProperty("--color-radius", t.radius + "px");
          r.setProperty("--toast-bg", t.toastBg);
          r.setProperty("--toast-text", t.toastText);
          r.setProperty("--toast-success", t.toastSuccess);
          r.setProperty("--toast-error", t.toastError);
          r.setProperty("--toast-warning", t.toastWarning);
          r.setProperty("--toast-info", t.toastInfo);
          var fonts = {
            inter: '"Inter", system-ui, sans-serif',
            roboto: '"Roboto", system-ui, sans-serif',
            poppins: '"Poppins", system-ui, sans-serif',
            nunito: '"Nunito", system-ui, sans-serif',
            montserrat: '"Montserrat", system-ui, sans-serif',
            "jetbrains-mono": '"JetBrains Mono", ui-monospace, monospace',
            merriweather: '"Merriweather", Georgia, serif',
            quicksand: '"Quicksand", system-ui, sans-serif',
          };
          r.setProperty("--font-family", fonts[t.fontFamily] || fonts.inter);
          document.documentElement.style.colorScheme = t.mode;
        } catch (e) {}
      })();
    </script>
