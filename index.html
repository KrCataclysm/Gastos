<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#101425" />
    <meta name="description" content="Gastos: sua planilha de custos profissional na palma da mão." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gastos" />
    <link rel="icon" type="image/png" sizes="32x32" href="/Gastos/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/Gastos/favicon-16.png" />
    <link rel="apple-touch-icon" href="/Gastos/icons/apple-touch-icon.png" />
    <title>Gastos - Controle de Gastos</title>
    <script>
      // Restaura a rota original após o redirect do 404.html (GitHub Pages SPA fallback).
      (function () {
        var redirect = new URLSearchParams(window.location.search).get("redirect");
        if (redirect) {
          window.history.replaceState(null, "", window.location.pathname.replace(/\/$/, "") + "/" + redirect);
        }
      })();
      (function () {
        try {
          var raw = localStorage.getItem("gastos:theme");
          if (!raw) return;
          var t = JSON.parse(raw);
          var r = document.documentElement.style;
          r.setProperty("--color-bg", t.bgColor);
          r.setProperty("--color-panel", t.panelColor);
          r.setProperty("--color-panel-alt", t.panelAltColor);
          r.setProperty("--color-border", t.borderColor);
          r.setProperty("--color-text", t.fontColor);
          r.setProperty("--color-text-muted", t.mutedColor);
          r.setProperty("--color-accent", t.accentColor);
          r.setProperty("--color-income", t.incomeColor);
          r.setProperty("--color-expense", t.expenseColor);
          r.setProperty("--color-radius", t.radius + "px");
          document.documentElement.style.colorScheme = t.mode;
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
