<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Gastos</title>
    <script>
      // GitHub Pages SPA fallback: codifica o caminho atual na query string
      // e redireciona para o index, que decodifica e restaura a rota via history API.
      // https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // mantém "/Gastos"
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?redirect=" +
          encodeURIComponent(
            l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/") + l.search + l.hash,
          ),
      );
    </script>
  </head>
  <body></body>
</html>
